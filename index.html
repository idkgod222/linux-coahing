<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinuxMaster - Professional Linux Coaching</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #a371f7;
            --accent-orange: #f0883e;
        }
       
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 80px; }
       
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* === ALL ORIGINAL ANIMATIONS PRESERVED === */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none; z-index: 0;
            animation: gridMove 25s linear infinite;
        }
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(0deg); } 100% { transform: perspective(500px) rotateX(0deg); } }

        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0; opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }
        .orb-1 { width: 600px; height: 600px; top: -200px; left: -200px; background: var(--accent); }
        .orb-2 { width: 500px; height: 500px; bottom: -150px; right: -150px; background: var(--accent-green); animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; top: 50%; left: 50%; background: var(--accent-purple); animation-delay: -10s; opacity: 0.08; }
        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 25% { transform: translate(50px,-50px) scale(1.1); } 50% { transform: translate(-30px,30px) scale(0.9); } 75% { transform: translate(20px,40px) scale(1.05); } }

        nav { position: fixed; top: 0; width: 100%; background: rgba(13,17,23,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(48,54,61,0.5); z-index: 1000; padding: 1rem 0; }
        nav.scrolled { background: rgba(13,17,23,0.98); box-shadow: 0 4px 30px rgba(0,0,0,0.4); }

        .logo { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo i { animation: spin 12s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 25px; height: 2px; background: var(--text-primary); transition: all 0.3s ease; }

        .nav-links a { color: var(--text-secondary); text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.3s ease; }
        .nav-links a:hover { color: var(--text-primary); background: rgba(88,166,255,0.1); }

        .hero-badge, .btn, .plan-card, .distro-item { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .distro-list, .pricing-grid {
            max-width: 1200px; margin: 0 auto;
            display: grid; gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        }

        .distro-item, .plan-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.8rem 2rem; cursor: pointer;
        }
        .distro-item:hover, .plan-card:hover {
            transform: translateY(-8px); border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(88,166,255,0.15);
        }

        .distro-tag {
            position: absolute; top: 1rem; right: 1rem;
            background: var(--accent-orange); color: white;
            font-size: 0.75rem; padding: 0.25rem 0.8rem;
            border-radius: 9999px; font-weight: 600;
        }

        .plan-price { font-size: 2.8rem; font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .plan-price small { font-size: 1rem; color: var(--text-secondary); }

        .plan-cta {
            display: block; text-align: center; margin-top: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            color: white; padding: 1rem; border-radius: 12px;
            font-weight: 600; text-decoration: none;
        }
        .plan-cta:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(88,166,255,0.4); }

        /* Responsive */
        @media (max-width: 768px) {
            .distro-list, .pricing-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        <div class="hero-content" style="max-width:800px;">

                <i class="fas fa-terminal"></i> Expert Linux Coaching
            </div>

                Master Linux & Servers
            </h1>
            <p style="font-size:1.25rem;color
